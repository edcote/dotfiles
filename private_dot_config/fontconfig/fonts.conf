<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Add Noto Color Emoji as a fallback for JetBrainsMono Nerd Font -->
  <match target="pattern">
    <test name="family"><string>JetBrainsMono Nerd Font</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
  </match>

  <!-- Add Noto Color Emoji as a fallback for JetBrainsMono NF -->
  <match target="pattern">
    <test name="family"><string>JetBrainsMono NF</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
  </match>

  <!-- Also add fallback for the generic monospace alias -->
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
  </match>
</fontconfig>
